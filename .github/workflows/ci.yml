name: public-proof

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm contract:compile
      - run: pnpm evidence:verify

  solidity:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Forge tests in pinned container
        run: >-
          docker run --rm
          -v "$PWD/packages/coffer-arc/contracts:/source:ro"
          ghcr.io/foundry-rs/foundry@sha256:8347b728d5d393dac1c018691b36f506d23b9dcd78341d40ea0fcb11c3a19cdd
          "mkdir -p /tmp/contracts && cp -a /source/. /tmp/contracts/ && cd /tmp/contracts && forge test -vvv"
